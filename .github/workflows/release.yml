# ============================================================
# PDF 合并工具 - GitHub Actions 跨平台构建与发布工作流
#
# 触发条件：推送 v* 格式的 tag（如 v1.0.0）
# 构建目标：Windows (x64), macOS (x64 + arm64), Linux (x64)
# 发布方式：自动创建 GitHub Release 并上传所有安装包
# ============================================================

name: "构建与发布"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_NAME: "PDF合并工具"

jobs:
  # ── 创建 Release 草稿 ──
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: 获取版本号
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "${{ env.APP_NAME }} ${{ steps.get_version.outputs.VERSION }}"
          draft: true
          prerelease: false
          body: |
            ## PDF 合并工具 ${{ steps.get_version.outputs.VERSION }}

            ### 更新日志
            - 请在此处填写本版本的更新内容

            ### 下载说明

            | 平台 | 架构 | 文件 | 说明 |
            |------|------|------|------|
            | Windows | x64 | `*.msi` | MSI 安装包（推荐） |
            | Windows | x64 | `*.exe` (NSIS) | EXE 安装包 |
            | macOS | Intel x64 | `*_x64.dmg` | Intel Mac |
            | macOS | Apple Silicon | `*_aarch64.dmg` | M1/M2/M3 Mac |
            | Linux | x64 | `*.deb` | Debian/Ubuntu |
            | Linux | x64 | `*.rpm` | Fedora/CentOS |
            | Linux | x64 | `*.AppImage` | 通用 Linux |

            ### 系统要求
            - **Windows**: Windows 10 (1803) 及以上，需要 WebView2 运行时
            - **macOS**: macOS 10.15 (Catalina) 及以上
            - **Linux**: Ubuntu 20.04 / Fedora 33 / Debian 11 及以上

            ### 使用说明
            详见 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)

  # ── Windows 构建 ──
  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ── macOS 构建 (Intel x64) ──
  build-macos-x64:
    needs: create-release
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用 (x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-apple-darwin

  # ── macOS 构建 (Apple Silicon arm64) ──
  build-macos-arm64:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用 (arm64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin

  # ── Linux 构建 ──
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            rpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ── 发布 Release ──
  publish-release:
    needs: [create-release, build-windows, build-macos-x64, build-macos-arm64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 发布 Release（取消草稿状态）
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })

